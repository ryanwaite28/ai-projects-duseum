name: Deploy — prod

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── Gate: all CI checks must pass ────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Build Lambda ZIPs and upload to S3 artifact bucket ──────────────────────
  build:
    name: Build
    needs: [ci]
    uses: ./.github/workflows/_build-lambdas.yml
    with:
      sha: ${{ github.sha }}
      env: prod
      environment: build
    secrets:
      AWS_ROLE_ARN_BUILD: ${{ secrets.AWS_ROLE_ARN_BUILD }}

  # ── Deploy all CDK stacks to prod ────────────────────────────────────────────
  # The "prod" GitHub Environment requires manual approval before this job runs.
  # Configure required reviewers in: Settings → Environments → prod.
  deploy-prod:
    name: Deploy (prod)
    needs: [build]
    uses: ./.github/workflows/_cdk-deploy.yml
    with:
      environment: prod
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Build and deploy frontend SPA to S3 + CloudFront ────────────────────────
  deploy-frontend:
    name: Deploy Frontend (prod)
    needs: [deploy-prod]
    uses: ./.github/workflows/_deploy-frontend.yml
    with:
      environment: prod
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Post-deploy smoke tests ───────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (prod)
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}
          aws-region: us-east-1
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh prod ${{ github.sha }}
