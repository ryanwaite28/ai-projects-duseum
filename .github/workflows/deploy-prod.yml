name: Deploy — prod

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── Gate: all CI checks must pass ────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Build Lambda ZIPs and upload to S3 artifact bucket ──────────────────────
  # Runs in PARALLEL with pre-deploy-check — both need only [ci].
  build:
    name: Build
    needs: [ci]
    uses: ./.github/workflows/_build-lambdas.yml
    with:
      sha: ${{ github.sha }}
      env: prod
      environment: build
    secrets:
      AWS_ROLE_ARN_BUILD: ${{ secrets.AWS_ROLE_ARN_BUILD }}

  # ── Bootstrap prerequisites check (parallel with Build) ──────────────────────
  # Verifies bootstrap.sh outputs exist before CDK deploy runs.
  # Saves the full CDK deploy time (~15 min) when bootstrap.sh was not run.
  pre-deploy-check:
    name: Bootstrap Check (prod)
    needs: [ci]
    uses: ./.github/workflows/_pre-deploy-check.yml
    with:
      environment: prod
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Deploy all CDK stacks to prod ────────────────────────────────────────────
  # Gates on both build AND pre-deploy-check — both must pass.
  # The "prod" GitHub Environment requires manual approval before this job runs.
  # Configure required reviewers in: Settings → Environments → prod.
  deploy-prod:
    name: Deploy (prod)
    needs: [build, pre-deploy-check]
    uses: ./.github/workflows/_cdk-deploy.yml
    with:
      environment: prod
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Build and deploy frontend SPA to S3 + CloudFront ────────────────────────
  deploy-frontend:
    name: Deploy Frontend (prod)
    needs: [deploy-prod]
    uses: ./.github/workflows/_deploy-frontend.yml
    with:
      environment: prod
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Runtime dependency check — gates smoke tests ──────────────────────────────
  # Verifies config table seeded, secrets present, Stripe price active.
  # Smart: distinguishes table-missing (CDK failed) vs key-missing (bootstrap gap).
  dep-check:
    name: Dependency Check (prod)
    needs: [deploy-frontend]
    uses: ./.github/workflows/_dep-check.yml
    with:
      environment: prod
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}

  # ── Post-deploy smoke tests ───────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (prod)
    needs: [dep-check]
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY_PROD }}
          aws-region: us-east-1
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh prod ${{ github.sha }}
