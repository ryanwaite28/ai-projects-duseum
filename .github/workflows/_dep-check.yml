name: Runtime Dependency Check (reusable)

# Verifies that all runtime data dependencies are present and correctly seeded
# after CDK deploy. Runs between Deploy Frontend and Smoke Test.
#
# A failure here gives the operator the real cause (missing config keys, missing
# secrets, inactive Stripe price) rather than a misleading smoke test failure.
#
# Smart logic in dep-check.sh distinguishes:
#   - Config table missing  → CDK deploy failed; check Deploy job
#   - Key missing           → bootstrap.sh not run; seed the table
#   - Placeholder value     → bootstrap.sh Stripe step incomplete

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Target environment — dev or prod
    secrets:
      AWS_ROLE_ARN:
        required: true
        description: IAM role ARN to assume via OIDC for this environment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dep-check:
    name: Dependency Check (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run runtime dependency check
        run: bash scripts/dep-check.sh ${{ inputs.environment }}
