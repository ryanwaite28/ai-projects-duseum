name: Deploy — dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── Gate: all CI checks must pass ────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Build Lambda ZIPs and upload to S3 artifact bucket ──────────────────────
  # Runs in PARALLEL with pre-deploy-check — both need only [ci].
  build:
    name: Build
    needs: [ci]
    uses: ./.github/workflows/_build-lambdas.yml
    with:
      sha: ${{ github.sha }}
      env: dev
      environment: build
    secrets:
      AWS_ROLE_ARN_BUILD: ${{ secrets.AWS_ROLE_ARN_BUILD }}

  # ── Bootstrap prerequisites check (parallel with Build) ──────────────────────
  # Verifies bootstrap.sh outputs exist before CDK deploy runs.
  # Saves the full CDK deploy time (~15 min) when bootstrap.sh was not run.
  pre-deploy-check:
    name: Bootstrap Check (dev)
    needs: [ci]
    uses: ./.github/workflows/_pre-deploy-check.yml
    with:
      environment: dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_DEV }}

  # ── Deploy all CDK stacks to dev ─────────────────────────────────────────────
  # Gates on both build AND pre-deploy-check — both must pass.
  deploy:
    name: Deploy (dev)
    needs: [build, pre-deploy-check]
    uses: ./.github/workflows/_cdk-deploy.yml
    with:
      environment: dev
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_DEV }}

  # ── Build and deploy frontend SPA to S3 + CloudFront ────────────────────────
  deploy-frontend:
    name: Deploy Frontend (dev)
    needs: [deploy]
    uses: ./.github/workflows/_deploy-frontend.yml
    with:
      environment: dev
      sha: ${{ github.sha }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_DEV }}

  # ── Runtime dependency check — gates smoke tests ──────────────────────────────
  # Verifies config table seeded, secrets present, Stripe price active.
  # Smart: distinguishes table-missing (CDK failed) vs key-missing (bootstrap gap).
  dep-check:
    name: Dependency Check (dev)
    needs: [deploy-frontend]
    uses: ./.github/workflows/_dep-check.yml
    with:
      environment: dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_DEPLOY_DEV }}

  # ── Post-deploy smoke tests ───────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (dev)
    needs: [dep-check]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY_DEV }}
          aws-region: us-east-1
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh dev ${{ github.sha }}
