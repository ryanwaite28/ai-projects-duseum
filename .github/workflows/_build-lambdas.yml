name: Build Lambdas (reusable)

# Builds all Lambda functions with esbuild and uploads ZIPs to the shared
# CI/CD artifact bucket at:
#   s3://duseum-cicd-artifacts/{env}/lambda/{sha}/{name}/function.zip
#
# Each environment (dev/prod) uploads under its own prefix — isolated, no
# shared state between pipelines. env and sha together form a unique key.
#
# Prerequisite: s3://duseum-cicd-artifacts must exist (created by bootstrap.sh).

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
        description: Git SHA used as the S3 key for this build
      env:
        required: true
        type: string
        description: Target deployment environment (dev or prod) — used as S3 prefix
      environment:
        required: true
        type: string
        description: GitHub Environment for OIDC sub claim (pass 'build')
    outputs:
      artifact-bucket:
        description: S3 bucket where ZIPs were uploaded
        value: ${{ jobs.build.outputs.artifact-bucket }}
    secrets:
      AWS_ROLE_ARN_BUILD:
        required: true
        description: ARN of duseum-github-actions-build — least-privilege role for duseum-cicd-artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Upload Lambda ZIPs
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      artifact-bucket: ${{ steps.upload.outputs.bucket }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BUILD }}
          aws-region: us-east-1

      # ── Bundle with esbuild ────────────────────────────────────────────────
      # Each Lambda entry point → single minified index.js + linked source map.
      # External @aws-sdk/* is provided by the Lambda runtime — not bundled.
      - name: Bundle lambdas with esbuild
        run: |
          bundle() {
            local NAME=$1
            local ENTRY=$2
            echo "=== Bundling $NAME ==="
            mkdir -p dist/lambdas/$NAME
            npx esbuild "$ENTRY" \
              --bundle \
              --minify \
              --sourcemap \
              --platform=node \
              --target=node20 \
              --external:@aws-sdk/* \
              --loader:.html=text \
              --outfile=dist/lambdas/$NAME/index.js
            (cd dist/lambdas/$NAME && zip -j function.zip index.js index.js.map)
            echo "  $(du -sh dist/lambdas/$NAME/function.zip | cut -f1)"
          }

          # Standard lambdas — entry is lambdas/{name}/src/index.ts
          for NAME in admin artworks auth-triggers features maintenance media \
                      notifications social subscriptions subscriptions-webhook users; do
            bundle "$NAME" "lambdas/$NAME/src/index.ts"
          done

          # stripe-ingress — separate entry point within the subscriptions-webhook package
          bundle "stripe-ingress" "lambdas/subscriptions-webhook/src/ingress.ts"

      # ── Upload to S3 ──────────────────────────────────────────────────────
      - name: Upload ZIPs to S3
        id: upload
        run: |
          BUCKET="duseum-cicd-artifacts"
          ENV="${{ inputs.env }}"
          SHA="${{ inputs.sha }}"

          for NAME in admin artworks auth-triggers features maintenance media \
                      notifications social subscriptions subscriptions-webhook users \
                      stripe-ingress; do
            aws s3 cp dist/lambdas/$NAME/function.zip \
              s3://$BUCKET/$ENV/lambda/$SHA/$NAME/function.zip \
              --region us-east-1
            echo "Uploaded s3://$BUCKET/$ENV/lambda/$SHA/$NAME/function.zip"
          done

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
