name: CDK Deploy (reusable)

# Runs cdk deploy --all for the given environment.
# The GitHub Environment protection rules on "prod" enforce manual approval.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Target environment — dev or prod
      sha:
        required: true
        type: string
        description: Git SHA passed as CDK context for resource tagging
    secrets:
      AWS_ROLE_ARN:
        required: true
        description: IAM role ARN to assume via OIDC for this environment

jobs:
  deploy:
    name: CDK Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    # GitHub Environment enables the protection rules (manual approval for "prod")
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - run: npm ci

      - name: CDK deploy all stacks
        working-directory: infrastructure
        run: |
          npx cdk deploy --all \
            --context env=${{ inputs.environment }} \
            --context sha=${{ inputs.sha }} \
            --require-approval never \
            --outputs-file cdk-outputs.json
