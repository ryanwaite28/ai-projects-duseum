name: CI

on:
  # pull_request:
  #   branches: [develop, main]
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Typecheck all workspaces ─────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ── Lint all workspaces ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Unit tests: packages/shared + frontend (no external services) ────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run unit tests (shared + frontend)
        run: npx turbo run test --filter='./packages/**' --filter='./frontend'

  # ── Integration tests: lambdas with MiniStack ────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      ministack:
        image: nahuelnucera/ministack:latest
        ports:
          - 4566:4566
        options: >-
          --health-cmd "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Initialize MiniStack resources
        run: bash scripts/ministack-init.sh
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
      - name: Run lambda tests (unit + integration against MiniStack)
        run: npx turbo run test --filter='./lambdas/**'
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  # ── CDK synth validate — dev ─────────────────────────────────────────────────
  cdk-synth-dev:
    name: CDK Synth (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: CDK synth dev
        run: cd infrastructure && npx cdk synth "duseum-dev/**" --strict --context env=dev --context sha=0000000000000000000000000000000000000000

  # ── CDK synth validate — prod ────────────────────────────────────────────────
  cdk-synth-prod:
    name: CDK Synth (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: CDK synth prod
        run: cd infrastructure && npx cdk synth "duseum-prod/**" --strict --context env=prod --context sha=0000000000000000000000000000000000000000
