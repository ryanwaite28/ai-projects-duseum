<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Rounded square with gold border matching the CSS logo mark -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6" ry="6"
        fill="#0e0d0b" stroke="#c8973a" stroke-width="1.5"/>
  <!-- D glyph — Playfair Display-style serif D, centered -->
  <text x="16" y="16"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="19"
        font-weight="600"
        fill="#c8973a">D</text>
</svg>
