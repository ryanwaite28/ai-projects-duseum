<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[Internal] Weekly feature booked</title>
</head>
<body style="margin:0;padding:0;background-color:#0e0d0b;font-family:'DM Sans',Arial,sans-serif;color:#f5f0e8;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation"
               style="max-width:600px;background-color:#1c1a16;border:1px solid rgba(200,151,58,0.18);border-radius:4px;overflow:hidden;">

          <tr>
            <td style="padding:28px 40px;border-bottom:1px solid rgba(200,151,58,0.1);">
              <span style="font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:#c8973a;">Duseum · Internal</span>
            </td>
          </tr>

          <tr>
            <td style="padding:40px 40px 16px;">
              <p style="margin:0 0 12px;font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#c8973a;">
                Weekly feature booked
              </p>
              <h1 style="margin:0 0 20px;font-size:24px;font-weight:400;color:#fdfaf4;line-height:1.2;">
                An author has booked a weekly feature slot.
              </h1>
              <div style="width:40px;height:1px;background-color:#c8973a;opacity:0.5;margin-bottom:24px;"></div>

              <table cellpadding="0" cellspacing="0" role="presentation"
                     style="width:100%;background-color:#0e0d0b;border:1px solid rgba(200,151,58,0.12);border-radius:2px;margin-bottom:24px;">
                <tr>
                  <td style="padding:16px 20px;border-bottom:1px solid rgba(200,151,58,0.08);">
                    <p style="margin:0;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#7a7068;">Author</p>
                    <p style="margin:4px 0 0;font-size:13px;color:#ede7d9;">{{authorDisplayName}}</p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 20px;border-bottom:1px solid rgba(200,151,58,0.08);">
                    <p style="margin:0;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#7a7068;">Author ID</p>
                    <p style="margin:4px 0 0;font-size:13px;color:#ede7d9;font-family:monospace;">{{authorId}}</p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 20px;border-bottom:1px solid rgba(200,151,58,0.08);">
                    <p style="margin:0;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#7a7068;">ISO Week</p>
                    <p style="margin:4px 0 0;font-size:13px;color:#ede7d9;font-family:monospace;">{{isoWeek}}</p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#7a7068;">Fee charged</p>
                    <p style="margin:4px 0 0;font-size:13px;color:#ede7d9;">${{feeUsd}} USD</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 40px;border-top:1px solid rgba(200,151,58,0.1);">
              <p style="margin:0;font-size:11px;font-weight:300;color:#7a7068;">Internal notification — Duseum platform</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
